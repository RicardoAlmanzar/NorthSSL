worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 200 'NorthSSL is running. ACME webroot is available.';
        }
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/default-cert/fullchain.pem;
        ssl_certificate_key /etc/nginx/default-cert/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            return 200 'NorthSSL TLS is running with the fallback certificate.';
        }
    }

    include /etc/nginx/sites-enabled/*.conf;
}
